<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khristopher Tabiquero – Resume</title>
  <meta name="description" content="Resume of Khristopher Tabiquero, Full-Stack & ML Engineer based in Manila, Philippines.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: hsl(224, 71%, 4%);
      color: hsl(210, 40%, 98%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: rgba(7, 10, 22, 0.7);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 48px 56px;
      max-width: 540px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: hsl(263, 90%, 60%, 0.12);
      border: 1px solid hsl(263, 90%, 60%, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .icon-wrap svg {
      width: 36px;
      height: 36px;
      color: hsl(263, 90%, 65%);
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    h1 span {
      background: linear-gradient(135deg, hsl(263, 90%, 65%), hsl(215, 90%, 60%));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: hsl(215, 20%, 65%);
      font-size: 15px;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, hsl(263, 90%, 60%), hsl(215, 90%, 55%));
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
      margin-bottom: 16px;
      width: 100%;
      justify-content: center;
    }

    .btn-download:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .btn-view {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 36px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: hsl(210, 40%, 98%);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
      width: 100%;
      justify-content: center;
    }

    .btn-view:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 32px 0;
    }

    .back-link {
      font-size: 13px;
      color: hsl(215, 20%, 50%);
      text-decoration: none;
    }

    .back-link:hover { color: hsl(263, 90%, 65%); }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </div>

    <h1>Khristopher <span>Tabiquero</span></h1>
    <p class="subtitle">
      Full-Stack &amp; ML Engineer · Manila, Philippines<br>
      Download or view my resume below.
    </p>

    <!-- Download button: points to resume.pdf in the same folder -->
    <a href="resume.pdf" download="Khristopher_Tabiquero_Resume.pdf" class="btn-download">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download PDF
    </a>

    <a href="resume.pdf" target="_blank" rel="noopener noreferrer" class="btn-view">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      View in Browser
    </a>

    <hr class="divider">
    <a href="https://github.com/keyarvi" class="back-link">← Back to Portfolio (coming soon)</a>
  </div>

</body>
</html>
